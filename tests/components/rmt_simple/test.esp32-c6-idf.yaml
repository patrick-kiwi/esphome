rmt_simple:
  resolution_hz: 80000000

  pin_0: GPIO10
  pulses_0:
    - duration0: 800
      level0: 1
      duration1: 800
      level1: 0
    - duration0: 400
      level0: 1
      duration1: 400
      level1: 0

  pin_1: GPIO11
  pulses_1:
    - duration0: 1600
      level0: 1
      duration1: 1600
      level1: 0
