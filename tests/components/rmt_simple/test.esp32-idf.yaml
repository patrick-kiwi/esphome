substitutions:
  pin_0: GPIO26
  pin_1: GPIO16

esp32:
  board: esp32dev
  framework:
    type: esp-idf

rmt_simple:
  id: rmt_test
  resolution_hz: 1000000
  align_pulse_lengths: false  # ESP32 (original) can disable pulse length alignment
  pin_0:
    gpio_number: ${pin_0}
    pulse_sequence:
      - duration0: 100
        level0: 1
        duration1: 100
        level1: 0
      - duration0: 200
        level0: 1
        duration1: 200
        level1: 0
  pin_1:
    gpio_number: ${pin_1}
    pulse_sequence:
      - duration0: 50
        level0: 1
        duration1: 50
        level1: 0
